version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: metrology_db
    restart: always
    env_file:
      - ./backend/.env
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: metrology_backend
    restart: always
    env_file:
    - ./backend/.env
    environment:
    - FRONTEND_URL=${FRONTEND_URL}
    ports:
      - "8000:8000"
    depends_on:
      - db
    volumes:
      - ./backend:/app

  frontend:
    build: ./frontend
    container_name: metrology_frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
    environment:
    - REACT_APP_API_URL=${FRONTEND_URL}

volumes:
  postgres_data: